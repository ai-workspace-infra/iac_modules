global:
  region: nrt
  name_prefix: web-saas
  user_data_file: cloud-init.yaml

ssh_keys:
  - name: ai-workspace-admin
    public: "ssh-rsa  shenlan@shenlandeMacBook-Air-2.local"

hosts:
  - name: console.onwalk.net
    os_name: "Debian 13 x64 (trixie)"
