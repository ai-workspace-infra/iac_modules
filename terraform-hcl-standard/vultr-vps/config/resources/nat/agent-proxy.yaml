global:
  region: nrt
  name_prefix: agent-proxy-nat
  user_data_file: cloud-init.yaml

ssh_keys:
  - name: ai-workspace-admin
    public: "ssh-rsa  shenlan@shenlandeMacBook-Air-2.local"

hosts:
  - name: agent-proxy-node-nat
    os_name: "Debian 13 x64 (trixie)"
    plan: vc2-1c-2gb
    backups: false
    enable_ipv6: true
    ansible_user: root
    groups: [agent_proxy, debian]
    tags: [debian]
    host_vars:
      role: primary
      service_domains:
        - agent-proxy.onwalk.net
